services:
  - type: web
    name: task-management-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd Backend && npm install && npm run build
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d

  - type: web
    name: task-management-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd Task-Management && npm install && npm run build
    staticPublishPath: ./Task-Management/dist
    envVars:
      - key: NODE_ENV
        value: production
